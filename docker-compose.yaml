services:
  db:
    image: postgres:16
    container_name: password-vault-db
    environment:
      POSTGRES_DB: password_vault
      POSTGRES_USER: password_vault
      POSTGRES_PASSWORD: password_vault
    ports:
      - "5432:5432"
    volumes:
      - password-vault-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U password_vault -d password_vault"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:10
    container_name: password-vault-flyway
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql
    command:
      -url=jdbc:postgresql://db:5432/password_vault
      -user=password_vault
      -password=password_vault
      migrate

volumes:
  password-vault-db-data: